version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: hangman-server
    ports:
      - "3001:3001"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TABLE_NAME: ${TABLE_NAME:-HangmanPlayers}

  client:
    build:
      context: .
    container_name: hangman-client
    ports:
      - "5173:5173"
    depends_on:
      - server